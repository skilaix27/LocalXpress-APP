version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: localxpress-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: localxpress
      POSTGRES_USER: localxpress
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U localxpress -d localxpress']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: localxpress-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://localxpress:password@postgres:5432/localxpress
    ports:
      - '3001:3001'
    volumes:
      - uploads_data:/app/uploads

volumes:
  postgres_data:
  uploads_data:
