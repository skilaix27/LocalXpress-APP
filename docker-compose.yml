# ══════════════════════════════════════════════════════════════════════════════
# LocalXpress — Docker Compose (Producción)
# Uso: docker compose up -d --build
# ══════════════════════════════════════════════════════════════════════════════

services:

  # ─── PostgreSQL 16 ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: localxpress
      POSTGRES_USER: localxpress
      POSTGRES_PASSWORD: LxPostgr3s@2024Secure!
    expose:
      - '5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U localxpress -d localxpress']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - localxpress_net

  # ─── Backend API ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://localxpress:LxPostgr3s@2024Secure!@postgres:5432/localxpress
      NODE_ENV: production
      PORT: 3001
      JWT_SECRET: lxJwtS3cr3t_7mK9pNqR4wXvB2cJ6hY3sZ8dF5tG0uA1eI_xProd2024
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: https://khaki-rail-609444.hostingersite.com
      STORAGE_DIR: ./uploads
      MAX_FILE_SIZE_MB: 10
      API_KEY_CREATE_ORDER: lx-b2b-3f8a2d1e9c4b6f7d-K2pM5qR8vXnZ_prod2024
      GOOGLE_MAPS_API_KEY: ""
      RESEND_API_KEY: ""
      RESEND_FROM: noreply@localxpress.com
      NOTIFICATION_EMAIL: admin@localxpress.com
    expose:
      - '3001'
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3001/api/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - localxpress_net

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local

networks:
  localxpress_net:
    driver: bridge